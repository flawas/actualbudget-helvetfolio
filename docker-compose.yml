version: '3.8'

# Uses the published images from Docker Hub / GHCR.
# No local build required.
#
# Pull:
#   docker pull flawas/helvetfolio:latest
#   docker pull ghcr.io/flawas/helvetfolio:latest
#
# Usage:
#   docker compose -f docker-compose.images.yml up -d helvetfolio-web
#   docker compose -f docker-compose.images.yml run --rm helvetfolio list

services:

  # One-shot CLI
  # docker compose -f docker-compose.images.yml run --rm helvetfolio add NESN 100
  helvetfolio:
    image: flawas/helvetfolio:latest
    container_name: helvetfolio
    environment:
      ACTUAL_SERVER_URL: ${ACTUAL_SERVER_URL}
      ACTUAL_PASSWORD: ${ACTUAL_PASSWORD}
      ACTUAL_BUDGET_ID: ${ACTUAL_BUDGET_ID}
      ACTUAL_DATA_DIR: /app/data
      UPDATE_INTERVAL_MINUTES: ${UPDATE_INTERVAL_MINUTES:-60}
      PORTFOLIO_FILE: /app/portfolio.json
    volumes:
      - ./data:/app/data
      - ./portfolio.json:/app/portfolio.json
    command: list

  # Background daemon — auto-syncs prices on a schedule
  helvetfolio-daemon:
    image: flawas/helvetfolio:latest
    container_name: helvetfolio-daemon
    environment:
      ACTUAL_SERVER_URL: ${ACTUAL_SERVER_URL}
      ACTUAL_PASSWORD: ${ACTUAL_PASSWORD}
      ACTUAL_BUDGET_ID: ${ACTUAL_BUDGET_ID}
      ACTUAL_DATA_DIR: /app/data
      UPDATE_INTERVAL_MINUTES: ${UPDATE_INTERVAL_MINUTES:-60}
      PORTFOLIO_FILE: /app/portfolio.json
    volumes:
      - ./data:/app/data
      - ./portfolio.json:/app/portfolio.json
    command: start-daemon
    restart: unless-stopped

  # Web UI — portfolio dashboard at http://localhost:3000
  helvetfolio-web:
    image: flawas/helvetfolio:latest
    container_name: helvetfolio-web
    environment:
      ACTUAL_SERVER_URL: ${ACTUAL_SERVER_URL:-}
      ACTUAL_PASSWORD: ${ACTUAL_PASSWORD:-}
      ACTUAL_BUDGET_ID: ${ACTUAL_BUDGET_ID:-}
      ACTUAL_DATA_DIR: /app/data
      PORTFOLIO_FILE: /app/portfolio.json
      WEB_PORT: 3000
      WEB_PASSWORD: ${WEB_PASSWORD:-}
    volumes:
      - ./data:/app/data
      - ./portfolio.json:/app/portfolio.json
    ports:
      - "${WEB_PORT:-3000}:3000"
    entrypoint: ["node"]
    command: ["/app/src/web-server.js"]
    restart: unless-stopped

volumes:
  actual-data:
    driver: local
