sonar.projectKey=flawas_actualbudget-helvetfolio
sonar.organization=flawas

# Source files to analyse (exclude tests and public browser JS)
sonar.sources=src,public

# Test files
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js

# Exclusions from analysis
sonar.exclusions=node_modules/**,data/**,coverage/**

# JavaScript / ECMAScript version
sonar.javascript.environments=node,browser
sonar.javascript.lcov.reportPaths=./coverage/lcov.info
