# Builds images from source — for local development.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d helvetfolio-web
#   docker compose -f docker-compose.dev.yml run --rm helvetfolio list

services:

  # One-shot CLI — only runs when explicitly invoked, not with `docker compose up`
  # docker compose -f docker-compose.dev.yml run --rm helvetfolio add NESN 100
  helvetfolio:
    build: .
    profiles: ["cli"]
    environment:
      ACTUAL_SERVER_URL: ${ACTUAL_SERVER_URL:-}
      ACTUAL_PASSWORD: ${ACTUAL_PASSWORD:-}
      ACTUAL_BUDGET_ID: ${ACTUAL_BUDGET_ID:-}
      ACTUAL_DATA_DIR: /app/data
      UPDATE_INTERVAL_MINUTES: ${UPDATE_INTERVAL_MINUTES:-60}
      PORTFOLIO_FILE: /app/data/portfolio.json
    volumes:
      - ./data:/app/data
    command: list

  # Background daemon — auto-syncs prices on a schedule
  helvetfolio-daemon:
    build: .
    environment:
      ACTUAL_SERVER_URL: ${ACTUAL_SERVER_URL:-}
      ACTUAL_PASSWORD: ${ACTUAL_PASSWORD:-}
      ACTUAL_BUDGET_ID: ${ACTUAL_BUDGET_ID:-}
      ACTUAL_DATA_DIR: /app/data
      UPDATE_INTERVAL_MINUTES: ${UPDATE_INTERVAL_MINUTES:-60}
      PORTFOLIO_FILE: /app/data/portfolio.json
    volumes:
      - ./data:/app/data
    command: start-daemon
    restart: unless-stopped

  # Web UI — portfolio dashboard at http://localhost:3000
  helvetfolio-web:
    build: .
    environment:
      ACTUAL_SERVER_URL: ${ACTUAL_SERVER_URL:-}
      ACTUAL_PASSWORD: ${ACTUAL_PASSWORD:-}
      ACTUAL_BUDGET_ID: ${ACTUAL_BUDGET_ID:-}
      ACTUAL_DATA_DIR: /app/data
      PORTFOLIO_FILE: /app/data/portfolio.json
      WEB_PORT: 3000
      WEB_PASSWORD: ${WEB_PASSWORD:-}
    volumes:
      - ./data:/app/data
    ports:
      - "${WEB_PORT:-3000}:3000"
    entrypoint: ["node"]
    command: ["/app/src/web-server.js"]
    restart: unless-stopped
